name: research-delegate
description: Conduct research using spawned sub-agents, summarize findings, and save to in-progress researches folder.
version: 1.0.0
author: Ceil

invocations:
  - "research"
  - "research-delegate"
  - "look up"
  - "find information about"

triggers:
  - pattern: "research {topic}"
    action: delegate_research
  - pattern: "look up {topic}"
    action: delegate_research
  - pattern: "find information about {topic}"
    action: delegate_research

capabilities:
  - spawn_subagent
  - file_write
  - summarize

parameters:
  topic:
    type: string
    required: true
    description: The research topic or question

output:
  type: file
  path: "/home/openclaw/.openclaw/workspace/researches/in-progress/{date}-{topic-slug}.md"
  format: markdown

defaults:
  subagent_model: "opencode-go/minimax-m2.5"
  subagent_mode: "run"
  append_existing: true
